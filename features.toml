steps = [
  { feature = "feature/sim-stream/stream-protocol-helpers", why = "The stream row owns reusable stream, rank, topology, and device helpers." },
  { specimen = "spec-test/sim-stream/crates/sim-lib-stream-core/src/read_construct", why = "The read-construct test checks stream metadata projection." },
]
